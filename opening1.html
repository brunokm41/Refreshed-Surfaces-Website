<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refreshed Surfaces</title>

  <!-- ============================================================
       FONTES DO GOOGLE
       Tenor Sans = elegante, refinada, para títulos e labels
       Jost = clean e moderna, para textos secundários
  ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />

  <!-- ============================================================
       CSS PRINCIPAL
  ============================================================ -->
  <link rel="stylesheet" href="css/styles-opening.css" />
</head>

<body class="page-home">

  <!-- ============================================================
       SEÇÃO 1 — NAVBAR
       Logo centralizada no topo, discreta sobre o hero
  ============================================================ -->
  <nav class="navbar">
    <a href="index2.html">
      <img src="images/logo.svg" alt="Refreshed Surfaces" class="nav-logo" />
    </a>
  </nav>

  <!-- ============================================================
       SEÇÃO 2 — HERO FULLSCREEN
       Imagem de fundo ocupando 100% da tela com overlay escuro,
       headline sobreposta e dois botões de entrada abaixo
  ============================================================ -->
  <section class="hero2">

    <!-- Imagem de fundo — substitua por sua foto real -->
    <div class="hero2-bg">
      <!-- Usa architectural.jpg como fundo temporário -->
      <img src="images/architectural.jpg" alt="" class="hero2-bg-img" />
    </div>

    <!-- Overlay escuro gradiente sobre a imagem -->
    <div class="hero2-overlay"></div>

    <!-- Conteúdo centralizado sobre o hero -->
    <div class="hero2-content">

      <!-- Tagline pequena acima do título -->
      <span class="hero2-eyebrow">Surface Transformation Specialists</span>

      <!-- Título principal grande -->
      <h1 class="hero2-title">
        Refresh.<br />Transform.<br />Elevate.
      </h1>

      <!-- Subtítulo -->
      <p class="hero2-subtitle">
        Premium vinyl wrapping for architectural spaces and kitchens.
      </p>

      <!-- Botões de entrada para as duas categorias -->
      <div class="hero2-cta-group">

        <!-- Botão 1: Architectural / Decoration -->
        <a href="architectural.html" class="hero2-cta">
          <span class="hero2-cta-label">Architectural / Decoration</span>
        </a>

        <!-- Divisor entre os botões -->
        <span class="hero2-cta-sep"></span>

        <!-- Botão 2: Kitchen Renovation -->
        <a href="kitchen.html" class="hero2-cta">
          <span class="hero2-cta-label">Kitchen Renovation</span>
        </a>

      </div>
      <!-- fim .hero2-cta-group -->

    </div>
    <!-- fim .hero2-content -->

    <!-- Indicador de scroll no canto inferior -->
    <div class="hero2-scroll">
      <span class="hero2-scroll-line"></span>
    </div>

  </section>
  <!-- fim .hero2 -->

</body>
</html>
